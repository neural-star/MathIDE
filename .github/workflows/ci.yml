name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test -- --run

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker buildx build --load -t mathide:ci .

      - name: Run application container and smoke test
        run: |
          docker run -d --name mathide-ci -p 8000:8000 mathide:ci
          for i in {1..10}; do
            if curl --fail http://127.0.0.1:8000/ >/dev/null 2>&1; then
              break
            fi
            sleep 3
          done
          curl --fail http://127.0.0.1:8000/ >/dev/null
        shell: bash

      - name: Stop application container
        if: always()
        run: docker stop mathide-ci
